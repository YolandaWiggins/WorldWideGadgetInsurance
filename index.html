<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Wide Gadget Insurance</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      background-color: #f5f7fa;
      color: #333;
    }
    header {
      background: #1a73e8;
      color: white;
      text-align: center;
      padding: 2rem 1rem;
      font-size: 2rem;
      font-weight: 700;
    }
    main {
      max-width: 600px;
      margin: 2rem auto;
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin-top: 1rem;
      font-weight: 500;
    }
    input, select, textarea {
      padding: 0.75rem;
      margin-top: 0.5rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    button {
      margin-top: 2rem;
      padding: 1rem;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background-color: #155ab6;
    }
    .payment {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #555;
    }
  </style>
</head>
<body>
  <header>World Wide Gadget Insurance</header>
  <main>
    <form id="insuranceForm">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="example@mail.com" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="(123) 456-7890" required>

      <label for="device">Device Type</label>
      <select id="device" name="device" required>
        <option value="">Select Device</option>
        <option value="phone">Phone</option>
        <option value="tablet">Tablet</option>
        <option value="laptop">Laptop</option>
        <option value="desktop">Desktop</option>
        <option value="other">Other</option>
      </select>

      <label for="details">Device Details / Model</label>
      <textarea id="details" name="details" placeholder="E.g., iPhone 14 Pro" rows="3" required></textarea>

      <div class="payment">
        Payment integration goes here (e.g., Stripe, PayPal)
      </div>

      <button type="submit">Submit Registration</button>
    </form>
  </main>

  <script>
    const form = document.getElementById('insuranceForm');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Registration submitted! (Payment integration placeholder)');
      form.reset();
    });
  </script>
</body>
</html>
