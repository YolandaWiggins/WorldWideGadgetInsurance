<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Wide Gadget Insurance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #f4f7fb, #e6ecf5);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }
    .container {
        background: #ffffff;
        width: 95%;
        max-width: 900px;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    }
    h1 {
        text-align: center;
        color: #1f3c88;
        font-size: 32px;
        margin-bottom: 10px;
    }
    .subtitle {
        text-align: center;
        color: #6b7280;
        margin-bottom: 30px;
    }
    form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    input, select {
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 14px;
        width: 100%;
    }
    input:focus, select:focus {
        outline: none;
        border-color: #1f3c88;
    }
    .full {
        grid-column: span 2;
    }
    .section-title {
        grid-column: span 2;
        margin-top: 20px;
        font-weight: 600;
        color: #374151;
        text-align: center;
    }
    button {
        grid-column: span 2;
        padding: 14px;
        background-color: #1f3c88;
        color: white;
        font-weight: 600;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
        transition: 0.3s ease;
    }
    button:hover {
        background-color: #162d66;
    }
    .footer-note {
        text-align: center;
        font-size: 12px;
        color: #6b7280;
        margin-top: 15px;
    }
    @media (max-width: 768px) {
        form { grid-template-columns: 1fr; }
        .full, .section-title, button { grid-column: span 1; }
    }
</style>
</head>
<body>

<div class="container">
    <h1>World Wide Gadget Insurance</h1>
    <p class="subtitle">Corporate Enrollment Portal – Secure Your Devices Globally</p>

    <form onsubmit="submitForm(event)">
        <input type="text" placeholder="Full Name" required class="full">
        <input type="email" placeholder="Email Address" required>
        <input type="tel" placeholder="Phone Number" required>

        <select required>
            <option value="">Select Gadget Type</option>
            <option>Smartphone</option>
            <option>Laptop</option>
            <option>Tablet</option>
            <option>Smart TV</option>
            <option>Gaming Console</option>
        </select>

        <input type="text" placeholder="Brand" required>
        <input type="text" placeholder="Model" required>
        <input type="text" placeholder="Serial Number" required class="full">

        <select required class="full">
            <option value="">Select Coverage Plan</option>
            <option>Basic – $9.99/month</option>
            <option>Premium – $19.99/month</option>
            <option>Global Elite – $29.99/month</option>
        </select>

        <div class="section-title">Secure Payment Information</div>

        <input type="text" placeholder="Name on Card" required class="full">
        <input type="text" placeholder="Card Number" required class="full">
        <input type="text" placeholder="Expiry Date (MM/YY)" required>
        <input type="text" placeholder="CVV" required>

        <button type="submit">Complete Enrollment & Pay</button>
    </form>

    <p class="footer-note">All transactions are encrypted and securely processed.</p>
</div>

<script>
function submitForm(event) {
    event.preventDefault();
    alert("Enrollment Submitted Successfully! (Demo Mode – No Real Payment Processed)");
}
</script>

</body>
</html>
